services:
  mongo:
    image: mongo:7
    container_name: pawprints-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend-node
    container_name: pawprints-backend
    restart: unless-stopped
    env_file:
      - ./backend-node/.env
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/pawprints
      DOCKER: "true"
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend-angular
    container_name: pawprints-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mongo_data:
