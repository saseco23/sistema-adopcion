services:
  mongo:
    image: mongo:7
    container_name: pawprints-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    image: saseco/pawprints-backend:latest
    container_name: pawprints-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/pawprints
      DOCKER: "true"
      JWT_SECRET: ${JWT_SECRET}
      EMAIL: ${EMAIL}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  frontend:
    image: saseco/pawprints-frontend:latest
    container_name: pawprints-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mongo_data:
